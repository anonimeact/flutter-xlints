name: xlints
description: Flutter performance linter that detects costly code patterns and
  provides actionable optimization guidance.
version: 1.0.2
repository: https://github.com/anonimeact/flutter-xlints.git
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  analyzer: ^8.4.0
  analyzer_plugin: ^0.13.10
  custom_lint: ^0.8.1
  custom_lint_builder: ^0.8.1

dev_dependencies:
  lints: ^6.0.0
  path: ^1.9.0
  test: ^1.25.6
